  d+=`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;}
 return d+'Z';}
const SCX=1590.7,SGND=726.6;
const eOutC=t=>1-Math.pow(1-t,3);          // ease-out cubic (soft landing)
// 2 parabolic bounces (each lower/shorter), then a soft eased settle to rest (no abrupt stop).
function shoeT(t2){
 let ty=0,sx=1,sy=1;
 const B=[[500,820,150],[1320,560,68]];     // bounce1 big, bounce2 lower & shorter
 let hit=false;
 for(const [a,dur,H] of B){
   if(t2>=a&&t2<a+dur){const p=(t2-a)/dur; ty=-H*4*p*(1-p);
     const imp=Math.max(0,1-Math.min(p,1-p)*4.5); sx=1+0.16*imp; sy=1-0.16*imp; hit=true; break;}}
 // soft settle: after last bounce, dip slightly then ease-out back to rest (cushioned stop)
 const Sa=1880,Sd=760;                        // settle window
 if(!hit && t2>=Sa && t2<Sa+Sd){
   const p=(t2-Sa)/Sd, e=eOutC(p);            // 0->1 ease-out
   const dip=14*Math.sin(Math.PI*p);          // small cushion dip that fades
   ty=dip*(1-e);                              // settles to 0 smoothly, decelerating
   const imp=(1-e)*0.06; sx=1+imp; sy=1-imp;
 }
 return {ty,sx,sy};   // after settle window: fully at rest, stopped (smoothly)
}

 s2.style.opacity=inS2.toFixed(3); s1.style.opacity=(1-inS2).toFixed(3);

 if(hd)hd.style.opacity=eIO(clamp((t2-300)/600,0,1)).toFixed(3);

 bl.forEach((e,i)=>{const pr=eIO(clamp((t2-600-i*45)/1500,0,1));const L=parseFloat(e.style.strokeDasharray);e.style.strokeDashoffset=(L*(1-pr)).toFixed(1);});
 const S=shoeT(t2);
 shoe.setAttribute('transform',`translate(0 ${S.ty.toFixed(1)}) translate(${SCX} ${SGND}) scale(${S.sx.toFixed(3)} ${S.sy.toFixed(3)}) translate(${-SCX} ${-SGND})`);
 requestAnimationFrame(frame);
}
