const PAUSE=500, SURGE_AT=1554.83, GW0=270, GW1=1647;        // graph x-range
const surgeFrac=(SURGE_AT-GW0)/(1920-0);                       // reveal width fraction at surge x
function frame(now){
 const T=(now-t0)%END, ts=now/1000;
 gBg.setAttribute('gradientTransform',`translate(${(Math.sin(ts*0.35)*160).toFixed(0)} ${(Math.cos(ts*0.3)*120).toFixed(0)})`);
 // --- graph reveal L->R with a 0.5s hold at the surge point ---
 // phase A: 0.3s..reveal reaches surge ; HOLD 0.5s ; phase B: continue to full
 const rStart=300, rA=4800, hold=PAUSE, rB=2600;               // durs: to-surge, pause, surge->end
 let rv;
 if(T<rStart){rv=0;}
 else if(T<rStart+rA){rv=surgeFrac*eIO(clamp((T-rStart)/rA,0,1));}
 else if(T<rStart+rA+hold){rv=surgeFrac;}                       // 0.5s pause at surge
 else {rv=surgeFrac+(1-surgeFrac)*eIO(clamp((T-rStart-rA-hold)/rB,0,1));}
 revealRect.setAttribute('width',(1920*Math.min(rv,1)).toFixed(0));
 // legend
 leg.style.opacity=eIO(clamp((T-300)/900,0,1)).toFixed(3);
 // 44.09 count-up, fills ~10s, slows hard toward the end
// number reaches ~the surge fraction by the pause, then eases out HARD to 44.09 over the rest
 const surgeT=rStart+rA;                          // moment graph hits surge (pause start)
 let np;
 if(T<surgeT){ np=0.80*eOutStrong(clamp((T-200)/(surgeT-200),0,1)); }   // up to 80% before surge
 else { np=0.80+0.20*eOutXtreme(clamp((T-surgeT)/4600,0,1)); }          // last 20%, very slow finish
 renderNum((44.09*np).toFixed(2),NUM);
 // dotted surge rises bottom->top during the pause (reveal reached surge)
 const dStart=rStart+rA;
 const dp=eIO(clamp((T-dStart)/650,0,1)); const dh=(DOT_Y1-DOT_Y0)*dp;
 dotRect.setAttribute('y',(DOT_Y1-dh).toFixed(1)); dotRect.setAttribute('height',dh.toFixed(1));
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
