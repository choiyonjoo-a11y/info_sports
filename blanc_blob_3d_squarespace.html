<!doctype html><html><head><meta charset="utf-8"><style>
 html,body{margin:0;width:100%;height:100%;background:transparent;}
 #bwrap{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;background:transparent;}
 #stage{position:absolute;left:50%;top:50%;width:1080px;height:1080px;transform-origin:center;}
 .sc{position:absolute;inset:0;}.sc svg{width:100%;height:100%;display:block;overflow:visible;}
</style></head><body>
<div id="bwrap"><div id="stage">
 <div class="sc" id="s1"><svg viewBox="0 0 1080 1080"><defs>
   <linearGradient id="gBlob" gradientUnits="userSpaceOnUse" x1="210" y1="210" x2="870" y2="870">
    <stop offset="0" stop-color="#9CC2E0"/><stop offset=".4" stop-color="#F3D9A6"/><stop offset=".7" stop-color="#EE8FA0"/><stop offset="1" stop-color="#E95E6C"/></linearGradient>
   <radialGradient id="gSphere" gradientUnits="userSpaceOnUse" cx="430" cy="420" r="560">
    <stop offset="0" stop-color="#fff" stop-opacity=".55"/>
    <stop offset=".35" stop-color="#fff" stop-opacity="0"/>
    <stop offset=".75" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity=".55"/></radialGradient>
   <radialGradient id="gSpec" gradientUnits="userSpaceOnUse" cx="410" cy="400" r="180">
    <stop offset="0" stop-color="#fff" stop-opacity=".85"/>
    <stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
  </defs>
   <g id="blobg">
    <path id="blobpath" d="" fill="url(#gBlob)"/>
    <path id="blobshade" d="" fill="url(#gSphere)"/>
    <ellipse id="spec" cx="410" cy="400" rx="150" ry="110" fill="url(#gSpec)"/>
   </g>
 </svg></div>
</div></div>
<script>
const $=s=>document.querySelector(s);
const stage=$('#stage');
const bwrap=document.getElementById('bwrap');
function fit(){
 const w=bwrap.clientWidth, h=bwrap.clientHeight;
 if(w>0&&h>0){const s=Math.min(w,h)/1080; stage.style.transform=`translate(-50%,-50%) scale(${s})`;}
}
addEventListener('resize',fit);addEventListener('load',fit);
if(window.ResizeObserver){new ResizeObserver(fit).observe(bwrap);}
if(window.IntersectionObserver){new IntersectionObserver(()=>fit()).observe(bwrap);}
[0,100,300,800,1500].forEach(d=>setTimeout(fit,d));fit();
const blobp=$('#blobpath');
const blobsh=$('#blobshade');
const spec=$('#spec');
const gBlob=$('#gBlob');
function blob(cx,cy,R,t){const N=9,P=[];
 for(let i=0;i<N;i++){const a=i/N*6.28319;
  const r=R*(1+0.17*Math.sin(a*3+t*1.7)+0.11*Math.sin(a*5-t*2.2)+0.08*Math.sin(a*2+t*1.1)+0.05*Math.sin(a*7+t*2.7));
  P.push([cx+Math.cos(a)*r,cy+Math.sin(a)*r]);}
 let d=`M${P[0][0].toFixed(1)},${P[0][1].toFixed(1)}`;
 for(let i=0;i<N;i++){const p0=P[(i-1+N)%N],p1=P[i],p2=P[(i+1)%N],p3=P[(i+2)%N];
  const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
  d+=`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;}
 return d+'Z';}
function frame(now){
 const ts=now/1000;
 const d=blob(540,540,335,ts);
 blobp.setAttribute('d',d);
 blobsh.setAttribute('d',d);
 gBlob.setAttribute('gradientTransform',`rotate(${(Math.sin(ts*0.4)*25).toFixed(1)} 540 540)`);
 const lx=Math.sin(ts*0.4)*30, ly=Math.cos(ts*0.33)*22;
 spec.setAttribute('cx',(410+lx).toFixed(1));
 spec.setAttribute('cy',(400+ly).toFixed(1));
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
